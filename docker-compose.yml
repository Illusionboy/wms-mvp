services:
  postgres:
    image: postgres:16-alpine
    container_name: wms_postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      POSTGRES_DB: ${POSTGRES_DB:-wms}
      POSTGRES_USER: ${POSTGRES_USER:-wms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wms_password}
    ports:
      # 云部署把 BIND_HOST 设为 127.0.0.1，Postgres 只在本机可达（不暴露到公网）。
      # 本地默认 0.0.0.0 方便用宿主机工具连库。容器间仍走 postgres:5432，不受影响。
      - "${BIND_HOST:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wms_user} -d ${POSTGRES_DB:-wms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms_api
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      APP_NAME: ${APP_NAME:-WMS Inventory API}
      APP_ENV: ${APP_ENV:-local}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wms_user}:${POSTGRES_PASSWORD:-wms_password}@postgres:5432/${POSTGRES_DB:-wms}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_QUERY_USER_IDS: ${TELEGRAM_QUERY_USER_IDS:-}
      TELEGRAM_OPERATOR_USER_IDS: ${TELEGRAM_OPERATOR_USER_IDS:-}
      TELEGRAM_ADMIN_USER_IDS: ${TELEGRAM_ADMIN_USER_IDS:-}
      API_KEY: ${API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      QINSI_USERNAME: ${QINSI_USERNAME:-}
      QINSI_PASSWORD: ${QINSI_PASSWORD:-}
      QINSI_BASE_URL: ${QINSI_BASE_URL:-https://web.syt.qinsilk.com/gis/admin/}
      QINSI_WAREHOUSE_MAP: "${QINSI_WAREHOUSE_MAP:-}"
    ports:
      # 云 + NPM 时把 BIND_HOST 设为 127.0.0.1：API 只在本机可达，公网只走 NPM(80/443)。
      # NPM 反代目标用容器名 api:8000（同一 docker 网络），不依赖此宿主机端口。
      - "${BIND_HOST:-0.0.0.0}:${API_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms_telegram_bot
    # 云部署暂不使用 Telegram bot：加入 profile 后，默认 `docker compose up` 不会启动本服务，
    # 从而避免缺 TELEGRAM_BOT_TOKEN 时崩溃重启。需要时再用: docker compose --profile telegram up -d
    profiles: ["telegram"]
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      APP_NAME: ${APP_NAME:-WMS Inventory API}
      APP_ENV: ${APP_ENV:-local}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wms_user}:${POSTGRES_PASSWORD:-wms_password}@postgres:5432/${POSTGRES_DB:-wms}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_QUERY_USER_IDS: ${TELEGRAM_QUERY_USER_IDS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m app.bot.polling

  # Nginx Proxy Manager — 反向代理 + Let's Encrypt SSL（带 Web 管理界面）。
  # 主要给云部署用（VPS + 域名）。默认 `docker compose up` 不启动它（避免本地占用 80/443/81）。
  # 云上启用: docker compose --profile proxy up -d
  # 首次配置:
  #   1) 浏览器开 http://<服务器IP>:81 ，默认账号 admin@example.com / changeme，登录后立即改密码。
  #   2) Hosts → Proxy Hosts → Add：域名填你的域名，Forward Hostname 填 api、Forward Port 填 8000。
  #   3) SSL 标签页 → Request a new SSL Certificate（Let's Encrypt）+ Force SSL。
  #   注意：申证书前先把域名 A 记录解析到服务器 IP；确保放行 80/443（证书校验走 80）。
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: wms_npm
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP（证书校验 + 跳转 HTTPS）
      - "443:443"    # HTTPS
      - "81:81"      # 管理界面（建议用云防火墙只放行你的 IP）
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - api

volumes:
  postgres_data:
  npm_data:
  npm_letsencrypt:
