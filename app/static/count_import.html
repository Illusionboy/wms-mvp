<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盘点数据导入 — WMS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: #f5f5f5; color: #222; }
  .page { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #333; }

  .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 500; color: #555; }
  .field input, .field select { padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
  .field input:focus, .field select:focus { outline: none; border-color: #4f46e5; }
  .field-full { grid-column: 1 / -1; }

  .btn { padding: 8px 18px; border: none; border-radius: 5px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #4338ca; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-success:hover:not(:disabled) { background: #15803d; }
  .btn-ghost { background: #e5e7eb; color: #374151; }
  .btn-ghost:hover:not(:disabled) { background: #d1d5db; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  .stats { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 16px; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: #666; }
  .stat.warn .stat-val { color: #b45309; }
  .stat.ok .stat-val { color: #16a34a; }

  .filters { display: flex; gap: 8px; margin-bottom: 10px; }
  .filter-btn { padding: 4px 12px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
  .filter-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f1f5f9; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
  td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #fafafa; }
  .neg { color: #dc2626; font-weight: 600; }
  .pos { color: #16a34a; font-weight: 600; }
  .zero { color: #9ca3af; }
  .no-record { background: #fffbeb; }

  .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; }
  .alert-error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .alert-info { background: #eff6ff; border: 1px solid #93c5fd; color: #1e40af; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #4f46e5; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #step-preview, #step-result { display: none; }
  .tag { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 3px; }
  .tag-new { background: #eff6ff; color: #1d4ed8; }
</style>
</head>
<body>
<div class="page">
  <h1>📦 盘点数据导入</h1>

  <!-- ── Step 1: Upload ── -->
  <div class="card" id="step-upload">
    <h2>第一步：上传盘点文件</h2>
    <div id="upload-alert"></div>
    <div class="form-grid">
      <div class="field">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="X-API-Key" autocomplete="current-password">
      </div>
      <div class="field field-full">
        <label>盘点文件（支持秦丝生意通 .html 或通用 .xlsx）</label>
        <input type="file" id="file-input" accept=".html,.htm,.xlsx,.xls">
      </div>
      <div class="field">
        <label>盘点日期（实物盘点当天，不是录入日期）</label>
        <input type="date" id="count-date">
      </div>
      <div class="field">
        <label>仓库</label>
        <select id="warehouse-select"><option value="">-- 加载中 --</option></select>
      </div>
      <div class="field">
        <label>客户（留空表示无客户归属）</label>
        <select id="customer-select"><option value="">-- 无 --</option></select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-parse">解析预览</button>
    </div>
  </div>

  <!-- ── Step 2: Preview ── -->
  <div class="card" id="step-preview">
    <h2>第二步：确认对账数据</h2>
    <div id="preview-alert"></div>

    <div class="stats" id="stats-row"></div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" onclick="setFilter('diff')">仅有差异</button>
      <button class="filter-btn" onclick="setFilter('new')">WMS无记录</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>JAN条码</th>
            <th>商品名称</th>
            <th>盘点数量</th>
            <th>盘后WMS变动</th>
            <th>目标库存</th>
            <th>当前WMS库存</th>
            <th>ADJUST量</th>
          </tr>
        </thead>
        <tbody id="preview-tbody"></tbody>
      </table>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-export">⬇ 导出Excel</button>
      <button class="btn btn-success" id="btn-apply">✔ 确认导入WMS</button>
      <button class="btn btn-ghost" onclick="resetToStep1()">重新上传</button>
    </div>
  </div>

  <!-- ── Step 3: Result ── -->
  <div class="card" id="step-result">
    <h2>导入结果</h2>
    <div id="result-content"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="location.reload()">返回首页</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/inventory-count';
let currentDraftId = null;
let allLines = [];
let currentFilter = 'all';

// ── Init ──
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('wms_api_key');
  if (saved) document.getElementById('api-key').value = saved;

  // Default count_date to last day of previous month
  const d = new Date();
  d.setDate(0);
  document.getElementById('count-date').value = d.toISOString().slice(0, 10);

  await loadWarehousesAndCustomers();
});

async function loadWarehousesAndCustomers() {
  try {
    const [wRes, cRes] = await Promise.all([
      fetch(`${API}/warehouses`),
      fetch(`${API}/customers`),
    ]);
    const warehouses = await wRes.json();
    const customers = await cRes.json();

    const wSel = document.getElementById('warehouse-select');
    wSel.innerHTML = '<option value="">-- 请选择仓库 --</option>';
    warehouses.forEach(w => {
      const opt = new Option(w.name, w.name);
      wSel.appendChild(opt);
    });

    const cSel = document.getElementById('customer-select');
    cSel.innerHTML = '<option value="">-- 无 --</option>';
    customers.forEach(c => {
      const opt = new Option(c.name, c.name);
      cSel.appendChild(opt);
    });
  } catch (e) {
    showAlert('upload-alert', 'error', '无法加载仓库/客户列表，请检查服务是否运行');
  }
}

// ── Parse ──
document.getElementById('btn-parse').addEventListener('click', async () => {
  const apiKey = document.getElementById('api-key').value.trim();
  const file = document.getElementById('file-input').files[0];
  const countDate = document.getElementById('count-date').value;
  const warehouseName = document.getElementById('warehouse-select').value;
  const customerName = document.getElementById('customer-select').value;

  if (!apiKey) return showAlert('upload-alert', 'error', '请输入 API Key');
  if (!file) return showAlert('upload-alert', 'error', '请选择文件');
  if (!countDate) return showAlert('upload-alert', 'error', '请选择盘点日期');
  if (!warehouseName) return showAlert('upload-alert', 'error', '请选择仓库');

  localStorage.setItem('wms_api_key', apiKey);

  const fd = new FormData();
  fd.append('file', file);
  fd.append('count_date', countDate);
  fd.append('warehouse_name', warehouseName);
  if (customerName) fd.append('customer_name', customerName);

  const btn = document.getElementById('btn-parse');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>解析中…';
  clearAlert('upload-alert');

  try {
    const res = await fetch(`${API}/upload`, {
      method: 'POST',
      headers: { 'X-API-Key': apiKey },
      body: fd,
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.detail || `HTTP ${res.status}`);
    }
    currentDraftId = data.id;
    allLines = data.document.lines || [];
    renderPreview(data);
    document.getElementById('step-preview').style.display = 'block';
    document.getElementById('step-preview').scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    showAlert('upload-alert', 'error', `解析失败: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = '解析预览';
  }
});

function renderPreview(data) {
  const lines = data.document.lines || [];
  const diffLines = lines.filter(l => l.adjust_delta !== 0);
  const newLines = lines.filter(l => !l.has_wms_record);

  const statsRow = document.getElementById('stats-row');
  statsRow.innerHTML = `
    <div class="stat"><div class="stat-val">${lines.length}</div><div class="stat-lbl">盘点SKU数</div></div>
    <div class="stat ${diffLines.length > 0 ? 'warn' : 'ok'}">
      <div class="stat-val">${diffLines.length}</div><div class="stat-lbl">需ADJUST</div>
    </div>
    <div class="stat ok"><div class="stat-val">${lines.length - diffLines.length}</div><div class="stat-lbl">无差异</div></div>
    <div class="stat ${newLines.length > 0 ? 'warn' : ''}">
      <div class="stat-val">${newLines.length}</div><div class="stat-lbl">WMS无记录(新建)</div>
    </div>
  `;

  renderTable(lines);
}

function renderTable(lines) {
  const tbody = document.getElementById('preview-tbody');
  tbody.innerHTML = '';
  lines.forEach((l, i) => {
    const tr = document.createElement('tr');
    if (!l.has_wms_record) tr.classList.add('no-record');
    tr.dataset.filter = getLineFilter(l);
    const deltaClass = l.delta_after_count > 0 ? 'pos' : l.delta_after_count < 0 ? 'neg' : 'zero';
    const adjClass = l.adjust_delta > 0 ? 'pos' : l.adjust_delta < 0 ? 'neg' : 'zero';
    const newTag = !l.has_wms_record ? ' <span class="tag tag-new">新建</span>' : '';
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${l.jan_code}</td>
      <td>${escHtml(l.product_name)}${newTag}</td>
      <td>${l.count_quantity}</td>
      <td class="${deltaClass}">${l.delta_after_count > 0 ? '+' : ''}${l.delta_after_count}</td>
      <td>${l.target_quantity}</td>
      <td>${l.current_quantity}</td>
      <td class="${adjClass}">${l.adjust_delta > 0 ? '+' : ''}${l.adjust_delta}</td>
    `;
    tbody.appendChild(tr);
  });
  applyFilter();
}

function getLineFilter(l) {
  if (!l.has_wms_record) return 'new diff';
  if (l.adjust_delta !== 0) return 'diff';
  return 'all';
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('#preview-tbody tr').forEach(tr => {
    const f = tr.dataset.filter || '';
    if (currentFilter === 'all') tr.style.display = '';
    else if (currentFilter === 'diff') tr.style.display = f.includes('diff') ? '' : 'none';
    else if (currentFilter === 'new') tr.style.display = f.includes('new') ? '' : 'none';
  });
}

// ── Export Excel ──
document.getElementById('btn-export').addEventListener('click', () => {
  if (!currentDraftId) return;
  window.location.href = `${API}/${currentDraftId}/export`;
});

// ── Apply ──
document.getElementById('btn-apply').addEventListener('click', async () => {
  if (!currentDraftId) return;
  const apiKey = document.getElementById('api-key').value.trim();
  if (!confirm(`确认将盘点数据导入WMS？此操作会写入 ADJUST 事务，不可撤销。`)) return;

  const btn = document.getElementById('btn-apply');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>导入中…';
  clearAlert('preview-alert');

  try {
    const res = await fetch(`${API}/${currentDraftId}/apply`, {
      method: 'POST',
      headers: { 'X-API-Key': apiKey },
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
    showResult(data);
    document.getElementById('step-result').style.display = 'block';
    document.getElementById('step-result').scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    showAlert('preview-alert', 'error', `导入失败: ${e.message}`);
    btn.disabled = false;
    btn.textContent = '✔ 确认导入WMS';
  }
});

function showResult(data) {
  const el = document.getElementById('result-content');
  if (!data.applied) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(data.issues?.join('\n') || '导入失败')}</div>`;
    return;
  }
  el.innerHTML = `
    <div class="alert alert-success">
      <strong>导入成功！</strong><br>
      已调整: <strong>${data.adjusted_count}</strong> 个 SKU &nbsp;|&nbsp;
      新建记录: <strong>${data.created_count}</strong> 个 &nbsp;|&nbsp;
      无差异跳过: <strong>${data.no_change_count}</strong> 个
    </div>
  `;
}

// ── Helpers ──
function showAlert(containerId, type, msg) {
  const el = document.getElementById(containerId);
  el.innerHTML = `<div class="alert alert-${type}">${escHtml(msg)}</div>`;
}
function clearAlert(containerId) {
  document.getElementById(containerId).innerHTML = '';
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function resetToStep1() {
  document.getElementById('step-preview').style.display = 'none';
  currentDraftId = null;
  allLines = [];
}
</script>
</body>
</html>
